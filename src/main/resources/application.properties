spring.application.name=Hackhub

# H2 Database Configuration

#database h2 in memoria
#spring.datasource.url=jdbc:h2:mem:hackathondb

#usa h2 per la persistenza dei dati su file
spring.datasource.url=jdbc:h2:file:./data/hackathondb;AUTO_SERVER=true
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# H2 Console (accessibile su http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

